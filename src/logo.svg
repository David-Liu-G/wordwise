<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C5CE7"/>
      <stop offset="100%" style="stop-color:#4834D4"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FDCB6E"/>
      <stop offset="100%" style="stop-color:#F9A825"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- Subtle inner glow ring -->
  <rect x="20" y="20" width="472" height="472" rx="96" ry="96" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="2"/>

  <!-- Open book shape -->
  <path d="M 128 310 Q 128 275 165 258 L 244 225 Q 256 220 256 220 Q 256 220 268 225 L 347 258 Q 384 275 384 310 L 384 375 Q 384 392 370 398 L 268 430 Q 256 435 256 435 Q 256 435 244 430 L 142 398 Q 128 392 128 375 Z" fill="rgba(255,255,255,0.12)"/>
  <line x1="256" y1="220" x2="256" y2="435" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>

  <!-- Stylized W -->
  <text x="256" y="300" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="230" font-weight="900" fill="white" letter-spacing="-10">W</text>

  <!-- Sparkle top-right -->
  <g transform="translate(375, 125)">
    <path d="M 0 -20 L 5.5 -5.5 L 20 0 L 5.5 5.5 L 0 20 L -5.5 5.5 L -20 0 L -5.5 -5.5 Z" fill="url(#glow)" opacity="0.9"/>
  </g>

  <!-- Small accent dots -->
  <circle cx="145" cy="148" r="6" fill="url(#glow)" opacity="0.5"/>
  <circle cx="172" cy="118" r="4" fill="url(#glow)" opacity="0.35"/>
</svg>
